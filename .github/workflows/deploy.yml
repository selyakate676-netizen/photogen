name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy updates via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # 1. Swap setup (ensure active for build)
            echo "Checking swap..."
            if ! grep -q "/swapfile" /etc/fstab; then
              fallocate -l 2G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=2048
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo '/swapfile none swap sw 0 0' >> /etc/fstab
            fi
            swapon --show
            
            # 2. Update code
            cd /root
            echo "Updating code..."
            git fetch origin
            git checkout -f origin/main -B main
            git clean -fd
            
            # 3. Build while old version is still running
            echo "Installing dependencies..."
            npm install
            
            echo "Building project..."
            rm -rf .next
            npm run build
            
            # 4. Fresh Start (Minimal downtime)
            echo "Restarting application..."
            pm2 delete photogen || true
            fuser -k 3001/tcp || true
            pm2 start npm --name "photogen" -- run start
            pm2 save
            
            # 5. Diagnostic
            pm2 status
            netstat -tulpn | grep :3001 || echo "Port 3001 NOT active!"

name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy updates via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # 1. Swap setup
            if ! grep -q "/swapfile" /etc/fstab; then
              fallocate -l 2G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=2048
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo '/swapfile none swap sw 0 0' >> /etc/fstab
            fi

            # 2. Update code
            cd /root
            git fetch origin
            git checkout -f origin/main -B main
            git clean -fd

            # 3. Install & Build
            npm install
            rm -rf .next
            npm run build

            # 4. Restart app
            pm2 delete photogen || true
            fuser -k 3001/tcp || true
            pm2 start npm --name "photogen" -- run start
            pm2 save

            # 5. Configure Nginx for photogenlab.ru
            printf 'server {\n    listen 80;\n    server_name photogenlab.ru www.photogenlab.ru;\n    location / {\n        proxy_pass http://localhost:3001;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection upgrade;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_cache_bypass $http_upgrade;\n    }\n}\n' > /etc/nginx/sites-available/photogenlab.ru

            if [ ! -f /etc/nginx/sites-enabled/photogenlab.ru ]; then
              ln -s /etc/nginx/sites-available/photogenlab.ru /etc/nginx/sites-enabled/
            fi
            nginx -t && systemctl reload nginx

            # 6. SSL via Certbot
            apt-get install -y certbot python3-certbot-nginx
            certbot --nginx -d photogenlab.ru -d www.photogenlab.ru --non-interactive --agree-tos -m selyakate676@gmail.com --redirect || true

            # 7. Status
            pm2 status
            netstat -tulpn | grep :3001 || echo "Port 3001 NOT active!"

name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy updates via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # 1. Clear resources and processes
            echo "Cleaning up environment..."
            pm2 kill || true
            # Kill anything on port 3000 if fuser is available
            fuser -k 3000/tcp || true
            
            # 2. Swap setup (ensure active)
            if ! grep -q "/swapfile" /etc/fstab; then
              echo "Re-initializing swap..."
              swapoff -a || true
              rm -f /swapfile
              fallocate -l 2G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=2048
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo '/swapfile none swap sw 0 0' >> /etc/fstab
            fi
            swapon --show
            
            # 3. Update and Build
            cd /root
            git fetch origin
            git checkout -f origin/main -B main
            git clean -fd
            rm -rf .next
            
            npm install
            npm run build-safe
            
            # 4. Fresh Start
            pm2 start npm --name "photogen" -- start
            pm2 save
            
            # 5. Diagnostic
            pm2 status
            netstat -tulpn | grep :3000 || echo "Port 3000 NOT active!"
